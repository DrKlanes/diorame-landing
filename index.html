<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Diorame</title>
  <link rel="icon" type="image/png" href="./assets/favicon.png">
  <link rel="alternate" hreflang="en" href="https://diorame.com/en/">
  <link rel="alternate" hreflang="es" href="https://diorame.com/es/">
  <link rel="alternate" hreflang="x-default" href="https://diorame.com/">
  <style>
    body {
      margin: 0;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Manrope', sans-serif;
      color: #353535;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <p>Loading…</p>
  <script>
    (function () {
      var saved = localStorage.getItem('diorame-lang');
      var lang = saved || (navigator.language || navigator.userLanguage || 'en');
      var target = lang.toLowerCase().startsWith('es')
        ? 'https://es.diorame.com'
        : 'https://en.diorame.com';
      window.location.replace(target);
    })();
  </script>
</body>
</html>
