name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-en:
    name: Deploy EN → gh-pages-en
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy /en to gh-pages-en
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./en
          publish_branch: gh-pages-en
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: en → gh-pages-en (${{ github.sha }})"

  deploy-es:
    name: Deploy ES → gh-pages-es
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy /es to gh-pages-es
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./es
          publish_branch: gh-pages-es
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: es → gh-pages-es (${{ github.sha }})"
